<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC2-1review2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcf6f6; /* Soft light pinkish/white background */
            color: #333;
        }
        h1 {
            color: rgb(188, 122, 132);
        }
        p.instructions {
            color: rgb(150, 90, 100);
        }
        
        /* Custom game card styling */
        .game-card {
            background-color: #fdf2f4; /* Very soft pastel pink background */
            border: 2px solid #f3d1d6; /* Subtle pink border */
            padding: 12px 8px;
            font-size: clamp(1rem, 4vw, 1.3rem); /* Smooth scaling text for mobile screen bounds */
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            text-align: center;
        }
        .game-card:hover {
            transform: scale(1.03);
            background-color: #fbcdd4; /* Slightly deeper pink when hovered */
            border-color: rgb(188, 122, 132);
        }
        .game-card.selected {
            background-color: rgb(188, 122, 132); /* Solid theme pink when selected */
            color: white;
            border-color: rgb(150, 90, 100);
        }
        .game-card.matched {
            background-color: #96dcea;
            border-color: #86efac;
            color: #166534;
            cursor: default;
            transform: none;
            opacity: 0.7;
        }

        /* Standard custom primary button color */
        .btn-custom {
            background-color: rgb(188, 122, 132);
            color: white;
            border: none;
        }
        .btn-custom:hover {
            background-color: rgb(150, 90, 100);
            color: white;
        }
    </style>
</head>
<body>

    <div class="container my-4 px-3" style="max-width: 600px;">
        <header class="text-center mb-4">
            <h1 class="display-6 fw-bold">HC 2-1 Matching Game!</h1>
            <p class="instructions fs-6">Click a Chinese word, then click its English meaning to match them!</p>
        </header>

        <div class="card shadow-sm border-0 p-3 p-md-4 bg-white rounded-4">
            <div class="row g-3">
                <div class="col-6">
                    <div class="d-flex flex-column gap-3" id="chinese-col"></div>
                </div>
                <div class="col-6">
                    <div class="d-flex flex-column gap-3" id="english-col"></div>
                </div>
            </div>

            <div id="score-board" class="text-center mt-4 fw-bold fs-5 text-secondary">
                Matches: <span id="match-count" style="color: rgb(150, 90, 100);">0</span>
            </div>
            
            <div id="win-message" class="text-center mt-3 p-3 alert alert-success border-success border-dashed fw-bold fs-5 d-none">
                🎉 Awesome Job! You mastered the Lesson! 🎉 <br>
                <button class="btn btn-custom mt-2 px-4 py-2" onclick="resetGame()">Play Again</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const vocabulary = [
            { id: 1, zh: "我有一只小猫 (Wǒ yǒu yì zhī xiǎo māo)", en: "I have a kitten" },
            { id: 2, zh: "我叫马丽丽 (Wǒ jiào Mǎ Lìlì)", en: "My name is Ma Lili" },
            { id: 3, zh: "你姓什么 (Nǐ xìng shénme)", en: "What is your surname?" },
            { id: 4, zh: "你叫什么名字 (Nǐ jiào shénme míngzi)", en: "What is your name?" },
            { id: 5, zh: "他是谁 (Tā shì shéi)", en: "Who is he?" },
            { id: 6, zh: "他是我的朋友 (Tā shì wǒ de péngyou)", en: "He is my friend" }
        ];

        let selectedChinese = null;
        let selectedEnglish = null;
        let matches = 0;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function initGame() {
            const chineseCol = document.getElementById('chinese-col');
            const englishCol = document.getElementById('english-col');
            const winMessage = document.getElementById('win-message');
            const matchCount = document.getElementById('match-count');
            
            chineseCol.innerHTML = '';
            englishCol.innerHTML = '';
            
            // Toggled Bootstrap display utility class
            winMessage.classList.add('d-none');
            
            matches = 0;
            matchCount.innerText = matches;
            selectedChinese = null;
            selectedEnglish = null;

            const shuffledChinese = shuffle([...vocabulary]);
            const shuffledEnglish = shuffle([...vocabulary]);

            shuffledChinese.forEach(item => {
                const card = document.createElement('div');
                card.classList.add('game-card'); // Renamed to avoid framework conflicts
                card.innerText = item.zh;
                card.dataset.id = item.id;
                card.onclick = () => selectCard(card, 'zh');
                chineseCol.appendChild(card);
            });

            shuffledEnglish.forEach(item => {
                const card = document.createElement('div');
                card.classList.add('game-card');
                card.innerText = item.en;
                card.dataset.id = item.id;
                card.onclick = () => selectCard(card, 'en');
                englishCol.appendChild(card);
            });
        }

        function selectCard(card, type) {
            if (card.classList.contains('matched')) return;

            if (type === 'zh') {
                if (selectedChinese) selectedChinese.classList.remove('selected');
                selectedChinese = card;
                card.classList.add('selected');
            } else {
                if (selectedEnglish) selectedEnglish.classList.remove('selected');
                selectedEnglish = card;
                card.classList.add('selected');
            }

            checkMatch();
        }

        function checkMatch() {
            if (selectedChinese && selectedEnglish) {
                if (selectedChinese.dataset.id === selectedEnglish.dataset.id) {
                    selectedChinese.classList.remove('selected');
                    selectedEnglish.classList.remove('selected');
                    selectedChinese.classList.add('matched');
                    selectedEnglish.classList.add('matched');
                    
                    matches++;
                    document.getElementById('match-count').innerText = matches;
                    
                    selectedChinese = null;
                    selectedEnglish = null;

                    if (matches === vocabulary.length) {
                        document.getElementById('win-message').classList.remove('d-none');
                    }
                } else {
                    const zhCard = selectedChinese;
                    const enCard = selectedEnglish;
                    setTimeout(() => {
                        zhCard.classList.remove('selected');
                        enCard.classList.remove('selected');
                    }, 400);
                    selectedChinese = null;
                    selectedEnglish = null;
                }
            }
        }

        function resetGame() {
            initGame();
        }

        initGame();
    </script>
</body>
</html>
