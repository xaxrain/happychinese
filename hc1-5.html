<script>
// Data
const wordsData = [
  
{ text: "昨天", pinyin: "zuó tiān" },
{ text: "下班", pinyin: "xià bān" },
{ text: "回到", pinyin: "huí dào" },
{ text: "家", pinyin: "jiā" },
{ text: "已经", pinyin: "yǐ jīng" },
{ text: "十点", pinyin: "shí diǎn" },
{ text: "了", pinyin: "le" }
];

// Shuffle
function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

let dragged = null;

function loadWords() {
    const bank = document.getElementById("wordBank");
    const dropzone = document.getElementById("dropzone");

    bank.innerHTML = "";
    dropzone.innerHTML = "Drop words here";

    let shuffled = shuffle([...wordsData]);

    shuffled.forEach(item => {
        let div = document.createElement("div");
        div.className = "word";
        div.textContent = item.text;
        div.setAttribute("draggable", "true");
        div.setAttribute("data-pinyin", item.pinyin);

        div.addEventListener("dragstart", () => dragged = div);

        bank.appendChild(div);
    });

    document.getElementById("result").textContent = "";
}

// Drop behaviour
const dropzone = document.getElementById("dropzone");

dropzone.addEventListener("dragover", (e) => e.preventDefault());

dropzone.addEventListener("drop", (e) => {
    e.preventDefault();
    if (dragged) dropzone.appendChild(dragged);
});

// Check answer
function checkAnswer() {
    const words = document.querySelectorAll("#dropzone .word");
    let sentence = "";

    words.forEach(word => sentence += word.textContent);

    if (sentence === "昨天下班回到家已经十点了") {
        result.textContent = "✅ Correct!";
        result.style.color = "green";
    } else {
        result.textContent = "❌ Try again!";
        result.style.color = "red";
    }
}

// Reset
function resetGame() {
    loadWords();
}

// Init
loadWords();
</script>

<script>
let mediaRecorder;
let audioChunks = [];

const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");
const resetBtn = document.getElementById("resetBtn");

const status = document.getElementById("status");
const audioPlayer = document.getElementById("audioPlayer");
const downloadLink = document.getElementById("downloadLink");

startBtn.addEventListener("click", async () => {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = event => {
            audioChunks.push(event.data);
        };

        mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
            const audioURL = URL.createObjectURL(audioBlob);

            audioPlayer.src = audioURL;

            const fileName = "HSK_Lesson7_" +
                new Date().toISOString().replace(/[:.]/g, "-") +
                ".webm";

            downloadLink.href = audioURL;
            downloadLink.download = fileName;
            downloadLink.style.display = "inline-block";

            status.textContent = "Recording complete.";
        };

        mediaRecorder.start();

        startBtn.disabled = true;
        stopBtn.disabled = false;
        status.textContent = "Recording...";

    } catch (error) {
        status.textContent = "Microphone blocked. Allow microphone access.";
        console.error(error);
    }
});

stopBtn.addEventListener("click", () => {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(track => track.stop());
    startBtn.disabled = false;
    stopBtn.disabled = true;
});

resetBtn.addEventListener("click", () => {
    audioPlayer.src = "";
    downloadLink.style.display = "none";
    status.textContent = "Ready to record.";
    audioChunks = [];
    startBtn.disabled = false;
    stopBtn.disabled = true;
});
</script>
