<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK Speaking Recorder</title>

<style>
/*--------------------------------------------------------------
# Font & Color Variables
# Template Name: Happy Chinese (Customized)
--------------------------------------------------------------*/
:root {
  --default-font: "Open Sans", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
  --heading-font: "Raleway", sans-serif;
  --nav-font: "Poppins", sans-serif;

  --background-color: #ffffff; 
  --default-color: #444444; 
  --heading-color: #37423b; 
  --accent-color: rgb(188, 122, 132); 
  --surface-color: #ffffff; 
  --contrast-color: #ffffff; 
}

/*--------------------------------------------------------------
# General Styling & Overrides
--------------------------------------------------------------*/
body {
  color: var(--default-color);
  background-color: var(--background-color);
  font-family: var(--default-font);
  max-width: 800px;
  margin: 40px auto;
  padding: 20px;
  line-height: 1.6;
}

h1, h2, h3, h4, h5, h6 {
  color: var(--heading-color);
  font-family: var(--heading-font);
}

h1 {
  font-size: 38px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 25px;
}

/* Question/Card Styling - Based on Template Section Cards */
.question {
  background-color: var(--surface-color);
  padding: 30px;
  border-radius: 12px;
  border: 1px solid color-mix(in srgb, var(--default-color), transparent 90%);
  margin-bottom: 30px;
  box-shadow: 0 5px 20px color-mix(in srgb, var(--default-color), transparent 95%);
}

.question h2 {
  font-size: 24px;
  margin-top: 0;
  margin-bottom: 25px;
}

.question p strong {
  color: var(--heading-color);
  font-family: var(--nav-font);
}

/*--------------------------------------------------------------
# Buttons & Interactive Controls
--------------------------------------------------------------*/
button {
  font-family: var(--heading-font);
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 1px;
  padding: 10px 24px;
  border-radius: 50px;
  transition: 0.3s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin: 5px;
  border: none;
  cursor: pointer;
}

/* Start Button - Primary Accent Style */
#startBtn {
  background-color: var(--accent-color);
  color: var(--contrast-color);
}

#startBtn:hover:not(:disabled) {
  background: color-mix(in srgb, var(--accent-color), transparent 20%);
}

/* Stop Button - Red Error/Alert Message Inspired Style */
#stopBtn {
  background-color: #df1529;
  color: #ffffff;
}

#stopBtn:hover:not(:disabled) {
  background-color: color-mix(in srgb, #df1529, black 15%);
}

/* Reset Button - Outline Style */
#resetBtn {
  background-color: transparent;
  color: var(--accent-color);
  border: 2px solid var(--accent-color);
  padding: 8px 22px; /* Adjusted padding to compensate for border width */
}

#resetBtn:hover:not(:disabled) {
  background-color: var(--accent-color);
  color: var(--contrast-color);
}

/* Disabled State Handling */
button:disabled {
  background-color: color-mix(in srgb, var(--default-color), transparent 85%) !important;
  color: color-mix(in srgb, var(--default-color), transparent 50%) !important;
  border-color: transparent !important;
  cursor: not-allowed;
  transform: none !important;
}

/*--------------------------------------------------------------
# Output Components & Media Links
--------------------------------------------------------------*/
#status {
  margin-top: 20px;
  font-size: 15px;
  font-weight: 600;
  color: color-mix(in srgb, var(--default-color), transparent 20%);
}

audio {
  width: 100%;
  margin-top: 20px;
  border-radius: 8px;
}

/* Media Downloader - Links & Actions */
#downloadLink {
  display: none;
  margin-top: 25px;
  color: var(--contrast-color);
  background: var(--accent-color);
  font-family: var(--heading-font);
  font-weight: 500;
  font-size: 14px;
  letter-spacing: 1px;
  padding: 8px 25px;
  border-radius: 50px;
  text-decoration: none;
  transition: 0.3s;
}

#downloadLink:hover {
  background: color-mix(in srgb, var(--accent-color), transparent 15%);
}
</style>
</head>

<body>

<h1>HSK Speaking Practice</h1>

<div class="question">
    <h2>Lesson 7: 你怎么去学校？</h2>

    <p><strong>Task:</strong></p>

    <p>
        请回答下面的问题：<br>
        <strong>你怎么去学校？为什么？</strong>
    </p>

    <p>
        Qǐng huídá xiàmiàn de wèntí:<br>
        <em>Nǐ zěnme qù xuéxiào? Wèishénme?</em>
    </p>

    <p>
        Please answer the question:<br>
        <em>How do you go to school? Why?</em>
    </p>

    <p><strong>Example:</strong></p>

    <p>
        我坐公共汽车去学校。<br>
        因为学校离我家很远，所以我坐公共汽车。
    </p>
</div>

<button id="startBtn">🎤 Start Recording</button>
<button id="stopBtn" disabled>⏹️ Stop Recording</button>
<button id="resetBtn">🔄 Record Again</button>

<div id="status">
    Ready to record.
</div>

<audio id="audioPlayer" controls></audio>

<br>

<a id="downloadLink">
    💾 Download Recording
</a>

<script>
let mediaRecorder;
let audioChunks = [];
let audioBlob;
let audioURL;

const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");
const resetBtn = document.getElementById("resetBtn");

const status = document.getElementById("status");
const audioPlayer = document.getElementById("audioPlayer");
const downloadLink = document.getElementById("downloadLink");

startBtn.addEventListener("click", async () => {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            audio: true
        });

        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = event => {
            audioChunks.push(event.data);
        };

        mediaRecorder.onstop = () => {
            audioBlob = new Blob(audioChunks, {
                type: "audio/webm"
            });

            audioURL = URL.createObjectURL(audioBlob);
            audioPlayer.src = audioURL;

            const fileName =
                "HSK_Lesson7_" +
                new Date().toISOString().replace(/[:.]/g, "-") +
                ".webm";

            downloadLink.href = audioURL;
            downloadLink.download = fileName;
            downloadLink.style.display = "inline-block";

            status.textContent = "Recording complete. You can listen or download your answer.";
        };

        mediaRecorder.start();

        startBtn.disabled = true;
        stopBtn.disabled = false;
        status.textContent = "Recording...";

    } catch (error) {
        status.textContent = "Microphone access denied. Please allow microphone access.";
        console.error(error);
    }
});

stopBtn.addEventListener("click", () => {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(track => track.stop());
    startBtn.disabled = false;
    stopBtn.disabled = true;
});

resetBtn.addEventListener("click", () => {
    audioPlayer.src = "";
    downloadLink.style.display = "none";
    status.textContent = "Ready to record.";
    audioChunks = [];
    audioBlob = null;
    startBtn.disabled = false;
    stopBtn.disabled = true;
});
</script>

</body>
</html>
